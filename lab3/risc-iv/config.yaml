name: Hello user pstr
limit: 2000
memory_size: 0x1000
memory_mapped_io:
  0x80: [""]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      {pc}:	{instruction}	{pc:label}
  - name: Result
    slice: last
    view: |
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
      numio[0x84]: {io:0x84:dec}
    assert: |
      symio[0x80]: "Alice\n" >>> ""
      symio[0x84]: "" >>> "What is your name?\nHello, Alice!'"
      numio[0x84]: [] >>> []