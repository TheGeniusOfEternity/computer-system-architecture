name: Hello user pstr
limit: 2000
memory_size: 0x1000
memory_mapped_io:
  0x80: ["Long edge suitable name\n"]
  0x84: []
reports:
  - name: Step-by-step
    slice: all
    view: |
      {pc}:	{instruction}	{pc:label}
  - name: Result
    slice: last
    view: |
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
      numio[0x84]: {io:0x84:dec}
    assert: |
      symio[0x80]: "" >>> ""
      symio[0x84]: "" >>> "What is your name?\nHello, Long edge suitable name!"
      numio[0x84]: [] >>> [87,104,97,116,32,105,115,32,121,111,117,114,32,110,97,109,101,63,10,72,101,108,108,111,44,32,76,111,110,103,32,101,100,103,101,32,115,117,105,116,97,98,108,101,32,110,97,109,101,33]